server:
  port: 9292

spring:
  application:
    name: seat-inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: postgres
    password: 123456

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: saga

  kafka:
    bootstrap-servers: localhost:9092